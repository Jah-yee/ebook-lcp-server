apiVersion: v1
kind: Secret
metadata:
  name: lcp-secrets
  labels:
    app: lcp-server
type: Opaque
stringData:
  jwt-secret: change-me-in-cluster
  admin-2fa-code: "000000"
  postgres-user: lcp
  postgres-password: change-me-in-cluster
  db-dsn: >-
    postgres://lcp:change-me-in-cluster@lcp-postgres:5432/lcp?sslmode=disable
  monitoring-token: replace-with-admin-jwt
