apiVersion: v1
kind: Service
metadata:
  name: lcp-core
  labels:
    app: lcp-core
spec:
  selector:
    app: lcp-core
  ports:
    - name: http
      port: 8989
      targetPort: 8989
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcp-core
  labels:
    app: lcp-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lcp-core
  template:
    metadata:
      labels:
        app: lcp-core
    spec:
      containers:
        - name: lcpserver
          image: registry.example.com/lcp/lcp-server-core:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/lcpserver"]
          env:
            - name: READIUM_LCPSERVER_CONFIG
              value: /srv/readium/config/lcpserver.yaml
          ports:
            - name: http
              containerPort: 8989
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /srv/readium/config
            - name: data
              mountPath: /srv/readium/data
      volumes:
        - name: config
          projected:
            sources:
              - configMap:
                  name: readium-core-config
                  items:
                    - key: lcpserver.yaml
                      path: lcpserver.yaml
              - secret:
                  name: readium-core-secret
                  items:
                    - key: htpasswd
                      path: htpasswd
                    - key: cert-edrlab-test.pem
                      path: cert-edrlab-test.pem
                    - key: privkey-edrlab-test.pem
                      path: privkey-edrlab-test.pem
        - name: data
          persistentVolumeClaim:
            claimName: readium-core-data
