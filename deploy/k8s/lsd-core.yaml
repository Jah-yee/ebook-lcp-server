apiVersion: v1
kind: Service
metadata:
  name: lsd-core
  labels:
    app: lsd-core
spec:
  selector:
    app: lsd-core
  ports:
    - name: http
      port: 8990
      targetPort: 8990
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsd-core
  labels:
    app: lsd-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lsd-core
  template:
    metadata:
      labels:
        app: lsd-core
    spec:
      containers:
        - name: lsdserver
          image: registry.example.com/lcp/lcp-server-core:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/lsdserver"]
          env:
            - name: READIUM_LSDSERVER_CONFIG
              value: /srv/readium/config/lsdserver.yaml
          ports:
            - name: http
              containerPort: 8990
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /srv/readium/config
            - name: data
              mountPath: /srv/readium/data
      volumes:
        - name: config
          projected:
            sources:
              - configMap:
                  name: readium-core-config
                  items:
                    - key: lsdserver.yaml
                      path: lsdserver.yaml
              - secret:
                  name: readium-core-secret
                  items:
                    - key: htpasswd
                      path: htpasswd
        - name: data
          persistentVolumeClaim:
            claimName: readium-core-data
